<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#08101f"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="30%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#d4a843" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="skin" cx="40%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#7c5638"/>
      <stop offset="60%" stop-color="#5d3f2a"/>
      <stop offset="100%" stop-color="#3d2818"/>
    </radialGradient>

    <linearGradient id="suit" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#52575e"/>
      <stop offset="100%" stop-color="#272b30"/>
    </linearGradient>
    <linearGradient id="lapel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2e34"/>
      <stop offset="100%" stop-color="#10131a"/>
    </linearGradient>
    <linearGradient id="tie" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>

    <linearGradient id="silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4f5f7"/>
      <stop offset="50%" stop-color="#c8ccd1"/>
      <stop offset="100%" stop-color="#8b8f96"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2c5b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0f1c3f" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- BACKGROUND -->
  <rect width="200" height="200" fill="url(#bg)"/>
  <rect width="200" height="200" fill="url(#warmGlow)"/>

  <!--
    GESICHTS-PROPORTIONEN (rule of thirds für Kopf):
    Kopf-Center: (100, 92), rx=34, ry=42
    → Kopf von y=50 bis y=134
    Drittel-Aufteilung: Hairline y=58, Eyebrows y=80, Nasen-Spitze y=104, Kinn y=128
  -->

  <!-- KÖRPER (Schultern + Anzug, klar erkennbar) -->
  <path d="M 0 200
           L 0 175
           Q 30 158, 70 152
           L 80 150
           L 100 168
           L 120 150
           L 130 152
           Q 170 158, 200 175
           L 200 200 Z" fill="url(#suit)"/>

  <!-- Linke Lapel -->
  <path d="M 80 150 L 100 168 L 95 200 L 60 200 L 65 175 Z" fill="url(#lapel)"/>
  <!-- Rechte Lapel -->
  <path d="M 120 150 L 100 168 L 105 200 L 140 200 L 135 175 Z" fill="url(#lapel)"/>

  <!-- Hemd (V-Ausschnitt) -->
  <path d="M 90 152 L 100 175 L 110 152 L 105 150 L 100 162 L 95 150 Z" fill="#fafafa"/>

  <!-- Krawatte (rot) -->
  <path d="M 95 158 L 105 158 L 110 200 L 90 200 Z" fill="url(#tie)"/>
  <!-- Krawatten-Knoten -->
  <path d="M 95 158 L 105 158 L 107 168 L 93 168 Z" fill="#ef4444"/>
  <path d="M 93 168 L 107 168 L 108 172 L 92 172 Z" fill="#7f1d1d"/>

  <!-- HALS (sichtbar zwischen Kinn und Anzug) -->
  <path d="M 88 130 L 88 152 Q 100 158, 112 152 L 112 130 Z" fill="url(#skin)"/>
  <!-- Schatten unter Kinn -->
  <ellipse cx="100" cy="132" rx="14" ry="3" fill="#000" opacity="0.3"/>

  <!-- KOPF (rund-oval, normal proportioniert) -->
  <ellipse cx="100" cy="92" rx="34" ry="42" fill="url(#skin)"/>
  <!-- Sanfter Schatten rechts für 3D -->
  <path d="M 100 50 Q 134 80, 134 100 Q 134 130, 100 134 L 100 50 Z" fill="#000" opacity="0.12"/>

  <!-- OHREN (Höhe der Augen) -->
  <ellipse cx="68" cy="92" rx="3.5" ry="7" fill="url(#skin)"/>
  <ellipse cx="132" cy="92" rx="3.5" ry="7" fill="url(#skin)"/>
  <path d="M 68 88 Q 67 92, 68 96" stroke="#3d2818" stroke-width="0.7" fill="none" opacity="0.7"/>
  <path d="M 132 88 Q 133 92, 132 96" stroke="#3d2818" stroke-width="0.7" fill="none" opacity="0.7"/>

  <!-- HAARE (kurz aber sichtbar, auf dem Kopf, klassischer Männerschnitt) -->
  <path d="M 66 70
           Q 68 50, 100 50
           Q 132 50, 134 70
           L 132 80
           Q 128 70, 100 68
           Q 72 70, 68 80 Z" fill="#0a0604"/>
  <!-- Hairline-Highlight -->
  <path d="M 74 68 Q 100 64, 126 68" stroke="#1a1208" stroke-width="0.6" fill="none" opacity="0.5"/>

  <!-- AUGENBRAUEN (y=78, über den Augen) -->
  <path d="M 80 78 Q 87 74, 95 78" stroke="#0a0604" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M 105 78 Q 113 74, 120 78" stroke="#0a0604" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- BRILLE (rechteckig, silbern, y=82-94) -->
  <rect x="74" y="82" width="22" height="14" rx="2" fill="url(#glass)"/>
  <rect x="104" y="82" width="22" height="14" rx="2" fill="url(#glass)"/>

  <!-- AUGEN (y=88, Mitte der Brille) -->
  <ellipse cx="86" cy="88" rx="3.2" ry="2.4" fill="white"/>
  <ellipse cx="114" cy="88" rx="3.2" ry="2.4" fill="white"/>
  <circle cx="86" cy="88.5" r="1.8" fill="#3a1f10"/>
  <circle cx="114" cy="88.5" r="1.8" fill="#3a1f10"/>
  <circle cx="86" cy="88.5" r="1" fill="#0a0604"/>
  <circle cx="114" cy="88.5" r="1" fill="#0a0604"/>
  <circle cx="85" cy="87.5" r="0.6" fill="white"/>
  <circle cx="113" cy="87.5" r="0.6" fill="white"/>

  <!-- Brillen-Fassung -->
  <rect x="74" y="82" width="22" height="14" rx="2" fill="none" stroke="url(#silver)" stroke-width="1.4"/>
  <rect x="104" y="82" width="22" height="14" rx="2" fill="none" stroke="url(#silver)" stroke-width="1.4"/>
  <path d="M 96 87 L 104 87" stroke="url(#silver)" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M 74 87 L 70 87" stroke="url(#silver)" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M 126 87 L 130 87" stroke="url(#silver)" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="71" cy="87" r="0.8" fill="#d4a843"/>
  <circle cx="129" cy="87" r="0.8" fill="#d4a843"/>

  <!-- 👃 NASE (y=98-110, KLAR INNERHALB des Kopfes) -->
  <!-- Nasenrücken Highlight -->
  <path d="M 100 98 L 100 108" stroke="#a37f5a" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
  <!-- Nasenspitze + Flügel -->
  <ellipse cx="100" cy="110" rx="4.5" ry="2.5" fill="#5d3f2a" opacity="0.7"/>
  <!-- Nasenlöcher -->
  <ellipse cx="97.5" cy="111" rx="1" ry="0.6" fill="#0a0604" opacity="0.7"/>
  <ellipse cx="102.5" cy="111" rx="1" ry="0.6" fill="#0a0604" opacity="0.7"/>

  <!-- 👄 MUND (y=118, KLAR INNERHALB des Kopfes — Kopf endet bei y=134) -->
  <!-- Untere Lippe (voller) -->
  <path d="M 92 119 Q 100 122, 108 119 Q 105 121, 100 121 Q 95 121, 92 119 Z" fill="#5a3525"/>
  <!-- Obere Lippe (M-Form) -->
  <path d="M 92 119 Q 96 116, 100 117 Q 104 116, 108 119 L 105 118 Q 100 117, 95 118 Z" fill="#4a2818"/>
  <!-- Mittellinie -->
  <path d="M 92 119 Q 100 120, 108 119" stroke="#3a1808" stroke-width="0.6" fill="none"/>
  <!-- Lippen-Highlight -->
  <path d="M 95 121 Q 100 122, 105 121" stroke="#7a4f30" stroke-width="0.6" fill="none" opacity="0.5"/>

  <!-- 🧔 STOPPEL-BART (y=110-128, INNERHALB des Kopfes) -->
  <!-- Bart-Schatten unter Lippen + entlang Kinn -->
  <path d="M 80 116
           Q 80 128, 88 132
           Q 100 136, 112 132
           Q 120 128, 120 116
           L 117 119
           Q 100 122, 83 119 Z" fill="#1a0f08" opacity="0.45"/>
  <!-- Schnurrbart über Mund -->
  <path d="M 88 113 Q 95 110, 100 111 Q 105 110, 112 113 L 110 115 Q 100 113, 90 115 Z" fill="#1a0f08" opacity="0.55"/>

  <!-- Wangen-Highlights für Tiefe -->
  <ellipse cx="76" cy="100" rx="6" ry="5" fill="#fff" opacity="0.04"/>
  <ellipse cx="124" cy="100" rx="6" ry="5" fill="#fff" opacity="0.04"/>
</svg>
