services:
  - type: web
    name: nt-pro-academy-control-hub
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
    disk:
      name: ntpro-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
